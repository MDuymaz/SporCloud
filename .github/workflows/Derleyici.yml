# Bu araç @keyiflerolsun tarafından | @KekikAkademi için yazılmıştır.
name: CloudStream Derleyici

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.jpg"
      - "**/*.png"
      - "**/*.py"

jobs:
  CloudStreamDerleyici:
    runs-on: ubuntu-latest

    steps:
      - name: 'src Deposu Kontrolü'
        uses: actions/checkout@v4.2.2
        with:
          path: "src"

      - name: 'builds Deposu Kontrolü'
        uses: actions/checkout@v4.2.2
        with:
          ref: "builds"
          path: "builds"

      - name: Eski Derlemeleri Temizle
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true

      - name: JDK 17 Ayarla
        uses: actions/setup-java@v4.6.0
        with:
          distribution: adopt
          java-version: 17

      - name: Android SDK Ayarla
        uses: android-actions/setup-android@v3.2.2

      - name: Android ortam değişkenlerini ayarla
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Eklentileri Derle (Detaylı Log ile)
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew clean make makePluginsJson --stacktrace --info | tee $GITHUB_WORKSPACE/builds/buildlog.txt
          find . -path "*/build/*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds \;
          cp build/plugins.json $GITHUB_WORKSPACE/builds || true

      - name: Derlemeleri Yükle
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          if git diff --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git add .
            git commit -m "$GITHUB_SHA 'nın Derlenmesi"
            git push
          fi
