name: Merge Domain Changes

on:
  push:
    branches:
      - domain-degisikligi

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Merge Changes
        run: |
          git fetch origin
          git merge origin/domain-degisikligi
          git push origin main
